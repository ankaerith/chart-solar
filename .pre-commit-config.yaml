# Local quality gate — same checks CI runs, but on every commit.
# Install: uv sync && uv run pre-commit install
# Run on demand: uv run pre-commit run --all-files

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: beads-pre-commit
        name: beads (export + dolt sync)
        entry: bd hooks run pre-commit
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-commit]

      - id: mypy
        name: mypy (backend, strict)
        entry: uv run mypy backend
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true

      - id: eslint
        name: eslint (frontend)
        entry: bash -c 'cd frontend && bun run lint'
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx|mjs|cjs)$
        pass_filenames: false

      - id: pip-licenses
        name: pip-licenses (block AGPL / SSPL / Commons Clause)
        entry: uv run pip-licenses --fail-on
        args:
          ["AGPL-3.0;AGPL-3.0-only;AGPL-3.0-or-later;SSPL-1.0;Commons Clause"]
        language: system
        files: ^(pyproject\.toml|uv\.lock)$
        pass_filenames: false
