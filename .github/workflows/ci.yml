name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: chart_solar
          POSTGRES_PASSWORD: chart_solar
          POSTGRES_DB: chart_solar
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chart_solar"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run ruff check
      - run: uv run ruff format --check
      - run: uv run mypy backend
      # --cov picks up source/omit/fail_under from [tool.coverage.*] in
      # pyproject.toml; CI fails when total coverage drops below the gate.
      - run: uv run pytest --cov
      - name: pip-licenses (block AGPL / SSPL / Commons Clause)
        run: uv run pip-licenses --fail-on "AGPL-3.0;AGPL-3.0-only;AGPL-3.0-or-later;SSPL-1.0;Commons Clause"
      - name: Alembic round-trip (upgrade head → downgrade base → upgrade head)
        run: |
          uv run alembic upgrade head
          uv run alembic downgrade base
          uv run alembic upgrade head

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run build

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
