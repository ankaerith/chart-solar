<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Sun backdrop — options</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  :root {
    --bg: #f4efe3;
    --panel: #ece6d5;
    --panel-2: #e2dac6;
    --ink: #112233;
    --ink-2: #3b4b5c;
    --ink-dim: #6c7787;
    --ink-faint: #8a93a0;
    --accent: #1f3a5f;
    --accent-2: #6e2230;
    --rule: #d8d0bd;
    --rule-strong: #b8af9b;
    --display-font: 'Newsreader', 'Times New Roman', serif;
    --display-weight: 500;
    --display-tracking: -0.005em;
    --body-font: 'Inter', system-ui, sans-serif;
    --mono-font: 'IBM Plex Mono', ui-monospace, monospace;
    --radius: 4px;
    --radius-lg: 6px;
  }
  body { background: var(--bg); color: var(--ink); font-family: var(--body-font); }
  .applyTheme { /* dummy */ }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="sun-mocks.jsx"></script>
</body>
</html>
